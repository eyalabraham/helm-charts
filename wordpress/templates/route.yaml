kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ include "wordpress.name" . }}
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
spec:
  path: /
  to:
    kind: Service
    name: {{ include "wordpress.name" . }}
    weight: 100
  port:
    targetPort: 80
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

